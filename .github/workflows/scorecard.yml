# OpenSSF Scorecard health checks.
#
# Scorecard inspects this repo's open-source security hygiene
# and publishes a score to the public OSSF Scorecard dashboard.
# The README embeds a badge linking to the dashboard.
#
# This is a sibling workflow to ``validibot/.github/workflows/scorecard.yml``;
# they're separate files because the two repos have independent
# release cadences and Scorecard scores. The shape is identical —
# see that file's docstring for the rationale.
#
# Why this matters specifically for the validator backends repo:
# the Docker images this repo publishes are what end up running
# user-submitted data inside customer deployments. Operators
# evaluating "should I trust this image?" look at the repo's
# Scorecard score as one input, alongside the SBOM and the OIDC
# build provenance that the release workflow attaches.

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '0 2 * * 0'  # 02:00 UTC every Sunday
  push:
    branches: ['main']
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc  # v2.4.4
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4.37.3
        with:
          sarif_file: results.sarif
