name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.19"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # --all-extras installs the per-validator groups (shacl, fmu, ...) that
        # pytest's testpaths collect; without them those modules fail to import.
        # --frozen guarantees CI tests the exact registry artifacts recorded in
        # the committed lockfile, matching the released container requirements.
        run: uv sync --all-extras --frozen

      - name: Audit dependencies
        run: uvx pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
