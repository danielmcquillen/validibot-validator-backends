name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          version: "0.5.16"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # --no-sources ignores [tool.uv.sources] (the local ../validibot-shared
        # editable override used for dev) so CI resolves the published
        # validibot-shared from the index, matching what container images ship.
        # --all-extras installs the per-validator groups (shacl, fmu, ...) that
        # pytest's testpaths collect; without them those modules fail to import.
        run: uv sync --all-extras --no-sources

      - name: Audit dependencies
        run: uvx pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
