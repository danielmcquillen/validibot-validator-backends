name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    # Ignore [tool.uv.sources] for the whole job. That table points
    # validibot-shared at the local ../validibot-shared editable checkout
    # for dev convenience; it does not exist on the runner. Setting this
    # once means every `uv`/`uvx` invocation (sync, run, uvx) resolves the
    # published validibot-shared from the index — matching what the
    # container images ship. (Per-command --no-sources is not enough:
    # `uv run` re-resolves the environment each time.)
    env:
      UV_NO_SOURCES: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          version: "0.5.16"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # --all-extras installs the per-validator groups (shacl, fmu, ...) that
        # pytest's testpaths collect; without them those modules fail to import.
        # (Source-ignoring is handled by UV_NO_SOURCES at the job level.)
        run: uv sync --all-extras

      - name: Audit dependencies
        run: uvx pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
